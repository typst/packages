# for a description of available keys, see https://github.com/typst/packages/?tab=readme-ov-file#package-format

[package]
name = "iconify"
version = "0.5.2"
entrypoint = "src/lib.typ"
authors = ["ecstrema"]
license = "MIT"
description = "Use all of iconify's icons in typst"
repository = "https://github.com/ecstrema/iconify-typst"
keywords = ["iconify", "icons", "mdi", "material", "lucide", "phosphor", "remix", "tableau", "design", "solar", "tabler", "unicons"]
categories = ["components"]
disciplines = []
# compiler = ""
exclude = [
  ".github",
  "scripts",
  "tests",
  "Justfile",
  "thumbnail-dark.svg",
  "thumbnail-light.svg",
]

