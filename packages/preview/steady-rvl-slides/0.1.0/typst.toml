exclude = [
  ".git",
  ".github",
  ".gitignore",
  "examples",
  "skills",
  "Makefile",
  "CHANGELOG.md",
]

[template]
path = "template"
entrypoint = "main.typ"
thumbnail = "thumbnail.png"
