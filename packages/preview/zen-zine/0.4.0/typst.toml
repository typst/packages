[package]
name = "zen-zine"
version = "0.4.0"
compiler = "0.11.0"
entrypoint = "src/lib.typ"
repository = "https://github.com/tomeichlersmith/zen-zine"
authors = ["Tom Eichlersmith <@tomeichlersmith>"]
license = "MIT"
description = "Excellently type-set a fun little zine!"
keywords = ["zine", "booklet", "leaflet", "brochure", "pamphlet"]
categories = ["fun", "layout"]

[template]
path = "template"
entrypoint = "main.typ"
thumbnail = "preview.png"

[tool.packager]
paths = ["src", "preview.png", "template", "LICENSE", "README.md"]
