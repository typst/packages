[package]
name = "breather"
version = "0.1.0"
entrypoint = "lib.typ"
authors = ["Nathan Scheinmann"]
license = "MIT"
description = "Fix overlapping lines caused by tall inline math (display fractions, big operators, matrices) with a single show rule"
repository = "https://github.com/nathan-ed/typst-package-breather"
keywords = ["math", "leading", "line spacing", "overlap", "fractions", "inline math", "layout"]
categories = ["layout", "utility"]
disciplines = ["mathematics", "education"]
compiler = "0.14.0"
exclude = ["docs/*", "gallery", "tests", "*.pdf"]
