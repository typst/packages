[package]
name = "unofficial-eirb-report"
version = "0.1.0"
entrypoint = "src/lib.typ"
authors = ["Florian Delage"]
license = "MIT"
description = "An unofficial report template for Enseirb-Matmeca"
repository = "https://github.com/floriandelage/report-eirb"
keywords = ["report","project","enseirb"]
categories = ["report"]
disciplines = ["engineering","computer-science"]
exclude = [
  ".github",
  "docs",
  "scripts",
  "tests",
  ".typstignore",
  "Justfile",
  "thumbnail-dark.svg",
  "thumbnail-light.svg",
]

[template]
path = "template"
entrypoint = "main.typ"
thumbnail = "thumbnail.png"
