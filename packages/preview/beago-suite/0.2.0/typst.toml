[package]
name = "beago-suite"
version = "0.2.0"
compiler = "0.14.2"
entrypoint = "src/lib.typ"
authors = ["Aaron P. Murniadi <aaronmurniadi@gmail.com>"]
repository = "https://github.com/aaronmurniadi/beago-suite"
license = "MIT"
keywords = ["suite", "minimal", "template", "pack", "book", "fantasy"]
description = "Minimal templates for drafts, articles, and fantasy books"
categories = ["layout", "paper", "book"]
exclude = ["example/", "*.pdf"]

[template]
path = "template"
entrypoint = "main.typ"
thumbnail = "thumbnail.png"
