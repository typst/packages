[package]
name = "canto-parser"
version = "0.2.1"
entrypoint = "lib.typ"
authors = ["Vincent Tam <https://github.com/VincentTam>"]
license = "MIT"
description = "A package for displaying Cantonese characters with Jyutping (粵拼) / Yale (耶魯) from raw JSON data."
repository = "https://github.com/VincentTam/pycantonese-parser"
keywords = [
    "jyutping",
    "cantonese",
]
categories = [
    "text",
    "languages",
    "utility",
]
compiler = "0.14.2"
exclude = ["pycanto_parser.png"]

