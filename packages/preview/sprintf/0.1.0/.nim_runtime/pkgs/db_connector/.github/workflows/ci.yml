name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Nim
        uses: alaviss/setup-nim@0.1.1
        with:
          path: 'nim'
          version: devel

      - name: Install Postgres libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev

      - name: Run tests
        run: |
          nimble tests
