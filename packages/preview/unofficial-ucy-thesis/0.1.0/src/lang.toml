appendix-title = "Τίτλος Παραρτήματος"
ack-body = "Εδώ μπορείτε να διατυπώσετε τυχόν ευχαριστίες προς πρόσωπα τα οποία αισθάνεσθε ότι συνέβαλαν αποφασιστικά ή σας βοήθησαν στην ολοκλήρωση της διπλωματικής σας εργασίας."
intro-p1 = "Η εισαγωγή είναι το πρώτο τμήμα της εργασίας και καλύπτει περίπου το 30% της συνολικής διατριβής. Εισάγει τον αναγνώστη στο θέμα, καθορίζοντας με σαφήνεια την εστίαση, τον σκοπό και την κατεύθυνση της έρευνάς σας."
intro-p2 = "Μπορεί να περιλαμβάνει ανασκόπηση του θεωρητικού υποβάθρου στο αντικείμενό σας. Η εισαγωγή θα πρέπει να περιλαμβάνει:"
intro-li-1 = "Το θέμα της διατριβής στο πλαίσιό του: παρουσιάστε το απαραίτητο θεωρητικό υπόβαθρο"
intro-li-2 = "Εστίαση και πεδίο εφαρμογής: ορίστε το πεδίο και το εύρος της έρευνάς σας"
intro-li-3 = "Σημασία της έρευνας: εξηγήστε πώς σχετίζεται με υπάρχουσες εργασίες"
intro-li-4 = "Ερωτήματα και στόχοι: διευκρινίστε τι επιδιώκει η έρευνά σας και πώς"
intro-li-5 = "Δομή της εργασίας: περιγράψτε συνοπτικά τα κεφάλαια που ακολουθούν"
background-p1 = "Στο κεφάλαιο αυτό περιγράφεται το θεωρητικό υπόβαθρο και η σχετική βιβλιογραφία. Παρουσιάστε την υπάρχουσα έρευνα και τα κενά που απευθύνεται η δική σας εργασία."
method-p1 = "Περιγράφονται τα υλικά και οι μέθοδοι της έρευνας. Παρουσιάστε τα βήματα με σαφήνεια και ακρίβεια, ώστε ο αναγνώστης να μπορεί να αξιολογήσει και να αναπαράγει τη μελέτη σας."
results-p1 = "Παρουσιάζονται τα κύρια ευρήματα της έρευνας. Αναφέρετε τα αποτελέσματα συνοπτικά και αντικειμενικά, με λογική σειρά. Η ερμηνεία των ευρημάτων γίνεται στο επόμενο κεφάλαιο."
discussion-p1 = "Συζητήστε τα ευρήματά σας, ερμηνεύστε τα σε σχέση με τα ερευνητικά ερωτήματα και συγκρίνετε με προηγούμενες εργασίες. Αναφέρετε περιορισμούς και επιπτώσεις."
conclusions-p1 = "Υπενθυμίστε τον σκοπό της μελέτης, συνοψίστε τα αποτελέσματα και παρουσιάστε τα συμπεράσματα. Αναφέρετε περιορισμούς και προτείνετε κατευθύνσεις για μελλοντική έρευνα."
appendix-p1 = "Αν έχετε υλικό που δεν μπορεί να συμπεριληφθεί στο κυρίως κείμενο, συμπεριλάβετέ το σε παράρτημα. Μπορείτε να έχετε ένα ή περισσότερα παραρτήματα (Παράρτημα Α, Β, κ.λπ.) με την ίδια μορφοποίηση επικεφαλίδων με τα κεφάλαια."
