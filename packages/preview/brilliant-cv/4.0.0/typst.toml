[package]
name = "brilliant-cv"
version = "4.0.0"
entrypoint = "src/lib.typ"
authors = ["Yunan Wang <https://github.com/yunanwg>"]
license = "Apache-2.0"
description = "💼 another CV template for your job application, yet powered by Typst and more"
repository = "https://github.com/yunanwg/brilliant-CV"
keywords = [
    "cv",
    "resume",
    "cover-letter",
    "curriculum-vitae",
    "modular",
    "multilingual",
    "ai-injection",
]
categories = ["cv", "languages", "layout"]
compiler = "0.14.0"
exclude = [
    "docs",
    "tests",
    "justfile",
    ".github",
    ".pre-commit-config.yaml",
    ".gitignore",
    "CLAUDE.md",
    "CONTRIBUTING.md",
]

[template]
path = "template"
entrypoint = "cv.typ"
thumbnail = "thumbnail.png"

[tool.utpm]
namespace = "preview"

[tool.tytanic]
# Tytanic tests run inside the Linux Docker image (tests/Dockerfile) on
# both maintainer machines and CI, so refs are pixel-deterministic — no
# cross-OS antialiasing to absorb. Tolerance stays tight enough that real
# layout regressions (1pt font-size drift, 0.5mm margin shift, accent
# color change) trigger the gate.
default.max-delta = 1
default.max-deviations = 0
