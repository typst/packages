[package]
name = "examy"
version = "0.2.0"
compiler = "0.15.0"
repository = "https://github.com/siefkenj/typst-examy"
entrypoint = "src/lib.typ"
authors = ["Jason Siefken <https://github.com/siefkenj>"]
categories = ["office", "layout"]
license = "MIT OR Apache-2.0"
description = "Template for writing exams, quizzes, and homework with automatic numbering, points, and cross-references"
keywords = ["exam", "homework", "quiz", "assignment"]
exclude = ["test", "examples"]

[tool.typst-test]
tests = "test/unit"