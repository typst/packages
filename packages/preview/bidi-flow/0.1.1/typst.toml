[package]
name = "bidi-flow"
version = "0.1.1"
entrypoint = "lib.typ"
authors = ["Rotem David Semah <@manemajef>"]
license = "MIT"
description = "Automatic RTL/LTR direction detection for mixed-direction documents (Hebrew, Arabic, Latin)"
keywords = ["rtl", "bidi", "hebrew", "arabic", "direction"]
categories = ["text", "utility", "languages"]
compiler = "0.14.0"
exclude = ["main.typ", "main.pdf", "debug.pdf", "scripts", "workflow"]
repository = "https://github.com/manemajef/bidi-flow"
