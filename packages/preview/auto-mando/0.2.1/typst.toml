[package]
name = "auto-mando"
version = "0.2.1"
entrypoint = "src/lib.typ"
authors = ["Vincent Tam <https://github.com/VincentTam>"]
license = "MIT"
description = "Automatic conversion to Mandarin romanizations from Chinese characters."
repository = "https://github.com/VincentTam/auto-mando"
keywords = [
    "Mandarin",
    "pinyin",
    "zhuyin",
    "Chinese",
    "conversion",
]
categories = [
    "text",
    "languages",
    "utility",
]
disciplines = [
    "education",
    "linguistics",
]
compiler = "0.14.0"
exclude = [
    "custom-ruby.png",
    "example.png",
    "pinyin-eg.png",
    "zhuyin-eg.png",
]

[tool]
