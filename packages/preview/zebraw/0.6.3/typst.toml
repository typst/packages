[package]
name = "zebraw"
version = "0.6.3"
entrypoint = "src/lib.typ"
authors = ["hongjr03 <https://github.com/hongjr03>"]
license = "MIT"
description = "A lightweight and fast package for displaying code blocks with line numbers or highlighting."
repository = "https://github.com/hongjr03/typst-zebraw"
compiler = "0.14.0"
keywords = [
    "code",
    "highlight",
    "raw",
    "line numbers",
]
categories = [
    "components",
    "layout",
]
exclude = [
    "assets",
    "bench",
    "example-html.typ",
]

[tool]
