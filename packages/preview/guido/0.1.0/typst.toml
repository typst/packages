[package]
name = "guido"
version = "0.1.0"
compiler = "0.13.0"
entrypoint = "guido.typ"
authors = ["Jomaway <https://github.com/jomaway>"]
license = "MIT"
description = "A template for creating beatuiful documents in Typst."
repository = "https://github.com/jomaway/typst-guido"
keywords = ["worksheets", "guides", "manuals", "tutorials", "scripts"]
categories = ["office"]
disciplines = ["education"]
exclude = ["/fonts/*"]
[template]
path = "template"
entrypoint = "handbook.typ"
thumbnail = "thumbnail.png"
