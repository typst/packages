[package]
name = "source-to-class-diagram"
version = "0.1.0"
compiler = "0.14.2"
entrypoint = "src/lib.typ"
authors = ["Leandro"]
license = "MIT"
description = "UML Class Diagrams for Typst, built on CeTZ. Supports Java and Csharp syntax with pluggable grammars."
repository = "https://github.com/typst-things/source-to-class-diagram"
categories = ["visualization", "components"]
keywords = ["uml", "class-diagram", "cetz", "diagram"]
exclude = ["tests/", "docs/", "gallery/"]

[template]
path = "exemplos"
entrypoint = "test-java.typ"
thumbnail = "thumbnail.png"