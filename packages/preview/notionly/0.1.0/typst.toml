# for a description of available keys, see https://github.com/typst/packages/?tab=readme-ov-file#package-format

[package]
name = "notionly"
version = "0.1.0"
entrypoint = "src/lib.typ"
authors = ["Mapaor"]
license = "MIT"
description = "A Typst package for obtaining the Notion look "
repository = "https://github.com/Mapaor/notionly"
keywords = ['notion', 'callouts', 'code-blocks', 'checklists', 'quotes', 'export', 'import']
categories = []
disciplines = []
# compiler = ""
exclude = [
  ".github",
  "docs",
  "fonts",
  "scripts",
  "tests",
  ".typstignore",
  "Justfile",
  "thumbnail-dark.svg",
  "thumbnail-light.svg",
]

