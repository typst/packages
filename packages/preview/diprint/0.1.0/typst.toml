[package]
name = "diprint"
version = "0.1.0"
entrypoint = "src/lib.typ"
authors = ["wylited"]
license = "MIT"
description = "arXiv-style papers that compile to HTML and PDF."
homepage = "https://github.com/wylited/diprint"
repository = "https://github.com/wylited/diprint"
keywords = ["arXiv", "paper", "preprint", "article", "HTML", "PDF"]
categories = ["paper"]
disciplines = ["computer-science", "engineering", "mathematics", "physics"]
compiler = "0.15.0"
exclude = [
  ".github",
  "scripts",
  "examples",
  "Justfile",
  "ref",
]

[template]
path = "template"
entrypoint = "main.typ"
thumbnail = "thumbnail.png"
