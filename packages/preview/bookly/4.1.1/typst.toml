[package]
name = "bookly"
version = "4.1.1"
authors = ["Mathieu Aucejo"]
license = "MIT"
description = "A clean, customizable template for writing and publishing structured books with front matter, chapters, and consistent styling."
entrypoint = "src/bookly.typ"
categories = ["book", "model"]
repository = "https://github.com/maucejo/bookly"
exclude = ["docs/manual.pdf"]

[template]
path = "template"
entrypoint = "main.typ"
thumbnail = "thumbnails/main.png"