# --- Begriffe und Definitionen (Glossar) ---
Ad-hoc-Netze:
  short: "Ad-hoc-Netze"
  long: "Ad-hoc-Netze"
  description: "Netzwerke, die ohne jegliche Infrastruktur auskommen, insbesondere ohne ausgezeichneten zentralen Koordinator, wie z.B. bei einer Stern-Topologie, welche den Medienzugriff zentral steuert. In Ad-hoc-Netzen sind spontane, nicht vorab geplante Kommunikationen zwischen den einzelnen Teilnehmern möglich."
  group: "Glossar"

Aloha:
  short: "Aloha"
  long: "Aloha"
  description: "Beim Aloha-Verfahren kann eine Einheit zu einem beliebigen Zeitpunkt ohne vorherige Absprache mit anderen Einheiten das Medium Funkkanal belegen. Eine derartige Einheit koordiniert weder den Zugriff auf das Medium, noch löst es Wettbewerbssituationen."
  group: "Glossar"
