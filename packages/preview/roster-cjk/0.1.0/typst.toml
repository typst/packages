[package]
name = "roster-cjk"
version = "0.1.0"
entrypoint = "lib.typ"
authors = ["308K <@308K>"]
license = "MPL-2.0"
description = "Lay out lists of CJK (mainly Chinese and Japanese) names into tidy, column-aligned roster grids, with built-in support for Japanese furigana (ruby) and suffixes."
repository = "https://github.com/308K/roster-cjk"
keywords = ["names", "roster", "chinese", "japanese", "cjk", "ruby", "layout", "i18n"]
categories = ["components", "languages", "layout"]
disciplines = ["linguistics"]
compiler = "0.14.0"

[tool.typst]
deprecated = false
