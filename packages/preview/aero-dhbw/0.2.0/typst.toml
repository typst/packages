[package]
name = "aero-dhbw"
version = "0.2.0"
entrypoint = "src/aero-dhbw.typ"
authors = ["cocoveal <https://github.com/cocoveal>"]
license = "MIT"
description = "Template for TX000 papers at DHBW Ravensburg"
keywords = ["template", "dhbw", "thesis"]
categories = ["paper", "thesis", "report"]
# Dev-only files kept out of the published bundle (see scripts/package).
exclude = ["scripts", ".github", "CLAUDE.md", ".gitignore", "cur-dev", "docs"]

[template]
path = "template"
entrypoint = "main.typ"
thumbnail = "thumbnail.png"
