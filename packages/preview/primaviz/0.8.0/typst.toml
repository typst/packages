[package]
name = "primaviz"
version = "0.8.0"
entrypoint = "src/lib.typ"
authors = ["phiat"]
license = "MIT"
description = "A charting library with 50+ chart types, 7 themes, and zero dependencies — built entirely with native primitives"
keywords = ["chart", "plot", "visualization", "graph", "data", "dashboard"]
repository = "https://github.com/phiat/primaviz"
compiler = "0.13.0"
exclude = [".beads/*", "tests/*", "justfile", "AGENTS.md", "CLAUDE.md", "CONTRIBUTING.md", "scripts/*", "examples/*", "screenshots/*", "data/*"]
