projects:
  title: 项目经历
  items:
  - name: 量化多因子选股挖掘与策略回测研究
    role: 研究骨干 (清华大学量化实验室)
    start: '2019.10'
    end: '2020.03'
    details:
    - 数据处理：利用 Python (Pandas/NumPy) 处理 A 股市场超过 10 年的高频交易数据、财务报表及宏观经济数据，完成异常值清洗并构建了包含动量、价值、成长等 50 多个维度的量化特征因子库。
    - 模型开发：开发并训练了基于 XGBoost 与随机森林的多因子非线性选股模型。结合 Barra 风险模型进行行业与市值中性化处理。
    - "回测表现：在自主搭建的回测框架中，该策略在扣除双边交易摩擦成本后，实现了年化 15% 的超额收益 (Alpha)，最大回撤控制在 8% 以内。"
