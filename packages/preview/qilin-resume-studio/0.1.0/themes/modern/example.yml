    - 参与某在线办公协作文档产品的前端开发。使用 React 和 Redux 处理复杂状态流转，优化了文档的渲染逻辑与 DOM 节点复用。
    - 通过引入 Web Worker 将密集型的数据解析计算转移至后台线程，解决了输入大型文档时的界面卡顿（UI 阻塞）问题。
