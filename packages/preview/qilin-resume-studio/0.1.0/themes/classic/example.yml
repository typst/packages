projects:
  title: 项目经历
  items:
  - name: 分布式键值存储系统 (TinyKV)
    role: 个人开源项目
    start: '2021.10'
    end: '2022.02'
    details:
    - 基于 C++11 从零实现的一个轻量级分布式 KV 存储数据库，参考了 Raft 一致性协议，保证多节点下的强一致性与容错能力。
    - 实现了核心的日志复制 (Log Replication)、领导者选举 (Leader Election) 和快照压缩 (Snapshot) 机制，解决了网络分区导致的脑裂问题。
    - 底层存储采用基于 LSM-Tree 的 RocksDB，结合 gRPC 构建节点间的高效通信。在本地 3 节点集群压测下，实现 10k+ QPS 的读写性能。
  - name: 高并发抢票系统
    role: 核心开发者
    start: '2020.12'
    end: '2021.03'
    details:
    - 开发并优化了一个模拟 12306 架构的高并发抢票系统，前后端分离，后端采用 Spring Cloud Alibaba 微服务架构体系。
    - "采用多级缓存策略：Nginx 本地缓存、Redis 分布式缓存拦截 90% 的无效请求；引入 RabbitMQ 进行异步下单削峰填谷。"
    - 通过 Redis 结合 Lua 脚本实现分布式的库存扣减，彻底解决了超卖问题。最终系统在 Jmeter 压测中可支撑 20000 稳定 QPS。
