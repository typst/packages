    - 系统设计：完整实现了一个能够支持千万级 QPS 流量洪峰的分布式秒杀架构。深入剖析限流原理，采用漏桶算法和令牌桶算法在 Nginx 网关层和业务网关层进行多级限流与熔断保护。
