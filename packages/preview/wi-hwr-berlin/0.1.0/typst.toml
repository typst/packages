[package]
name = "wi-hwr-berlin"
version = "0.1.0"
compiler = "0.13.1"
entrypoint = "lib.typ"
repository = "https://github.com/lultoni/hwr-typst-template"
authors = ["lultoni <https://github.com/lultoni>"]
license = "MIT"
description = "Academic paper template for HWR Berlin (Wirtschaftsinformatik)."
categories = ["thesis"]
keywords = ["thesis", "university", "hwr", "berlin", "wirtschaftsinformatik"]
disciplines = ["computer-science"]
exclude = ["reference-templates", "hwr-richtlinien", ".claude", "requirements", "scripts", ".github", "test-*"]

[dependencies]
"@preview/linguify:0.5.0" = {}
"@preview/glossarium:0.5.10" = {}

[template]
path = "template"
entrypoint = "main.typ"
thumbnail = "thumbnail.png"
