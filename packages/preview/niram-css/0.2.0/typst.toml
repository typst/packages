# for a description of available keys, see https://github.com/typst/packages/?tab=readme-ov-file#package-format

[package]
name = "niram-css"
version = "0.2.0"
entrypoint = "src/lib.typ"
authors = ["nandac"]
license = "Unlicense"
description = "Access all 147 standard CSS color names."
# homepage = ""
repository = "https://github.com/nandac/niram-css"
keywords = ["color", "css", "palette", "web", "svg", "html", "x11", "keyword"]
categories = ["components", "utility", "visualization"]
disciplines = ["design", "drawing"]
compiler = "0.13.0"
exclude = [
  ".github",
  "docs",
  "scripts",
  "tests",
  ".gitignore",
  ".typstignore",
  "Justfile",
  "colored-text-dark.svg",
  "colored-text-light.svg",
  "thumbnail-dark.svg",
  "thumbnail-light.svg",
]
