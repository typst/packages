
[package]
name = "czbloch"
version = "0.1.0"
entrypoint = "lib.typ"
authors = ["Víctor Ibáñez @ibnz36"]
license = "MIT"
description = "Draw Bloch spheres with ease."
repository = "https://github.com/Peng-Rao/czbloch"
keywords = ["quantum", "physics", "bloch-sphere", "qubit", "quantum-computing", "diagram", "visualization", "czbloch"]
