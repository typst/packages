[package]
name = "invoice-pro"
version = "0.4.0"
entrypoint = "src/lib.typ"
authors = [ "Leonie Ziechmann" ]
license = "MIT"
description = "A professional, DIN 5008 compliant invoice template with automatic calculations, EPC-QR-Code (GiroCode), and ZUGFeRD e-invoicing support."
homepage = "https://leonieziechmann.github.io/invoice-pro"
repository = "https://github.com/leonieziechmann/invoice-pro"
keywords = [ "invoice", "rechnung", "din-5008", "business", "qr-code", "i18n", "multilingual", "template", "zugferd", "e-invoice", "factur-x" ]
categories = [ "layout", "office", "integration" ]
compiler = "0.14.0"
exclude = [ "/images/**" ]

[template]
path = "template"
entrypoint = "invoice.typ"
thumbnail = "thumbnail.png"
