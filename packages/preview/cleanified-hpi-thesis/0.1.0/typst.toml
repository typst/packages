[package]
name = "cleanified-hpi-thesis"
version = "0.1.0"
entrypoint = "template/lib.typ"
authors = [
    "Robert Richter <https://github.com/judgeNotFound>",
    "Felix Hoffmann <https://github.com/felixhoffmnn>",
]
license = "MIT"
disciplines = [
    "computer-science",
    "engineering",
    "mathematics",
    "medicine",
    "business",
]
description = "A clean thesis template for Bachelor's and Master's theses at HPI, University of Potsdam."
repository = "https://github.com/felixhoffmnn/hpi-thesis-template"
keywords = [
    "HPI",
    "Hasso-Plattner-Institut",
    "Hasso Plattner Institute",
    "University of Potsdam",
    "Bachelorthesis",
    "Masterthesis",
    "Bachelorarbeit",
    "Masterarbeit",
    "thesis",
]
categories = ["thesis"]
compiler = "0.14.0"
exclude = ["example/main.pdf"]

[template]
path = "example"
entrypoint = "main.typ"
thumbnail = "thumbnail.png"
