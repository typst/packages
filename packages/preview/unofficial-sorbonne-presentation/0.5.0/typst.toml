[package]
name = "unofficial-sorbonne-presentation"
version = "0.5.0"
entrypoint = "lib.typ"
authors = ["David Hajage"]
license = "MIT"
keywords = ["presentation", "sorbonne", "iplesp", "aphp", "academic", "slides"]
description = "A unofficial structured presentation theme for Sorbonne University and IPLESP, based on presentate and navigator."
compiler = "0.12.0"
categories = ["presentation"]
exclude = [
  "tests",
  "*.pdf",
  "**/*.pdf",
  ".gitignore",
  ".DS_Store",
  "docs"
]

[template]
path = "template"
entrypoint = "main.typ"
thumbnail = "thumbnail.png"
